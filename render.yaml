services:
  - type: web
    name: price-arbitrage
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: RAKUTEN_APP_ID
        sync: false
      - key: RAKUTEN_ACCESS_KEY
        sync: false
      - key: RAKUTEN_AFFILIATE_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_URL_SNKRDUNK
        sync: false
      - key: YAHOO_APP_ID
        sync: false
