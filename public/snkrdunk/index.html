<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snkrdunk Arbitrage — スニダン × 楽天 × Yahoo 価格差ダッシュボード</title>
    <meta name="description" content="スニーカーダンクの人気商品を楽天・Yahooショッピングと比較して、アービトラージ（転売利益）が見込める商品をリアルタイム表示">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ヘッダー -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">👟</span>
                <h1>Snkrdunk<span class="logo-accent">Arb</span></h1>
                <span class="badge live" id="statusBadge">OFFLINE</span>
            </div>
            <div class="header-right">
                <div class="timer-pill" id="timerPill" title="次回スキャンまで">
                    <span class="timer-icon">⏱</span>
                    <span id="nextScanTimer">--:--</span>
                </div>
                <button class="refresh-btn" id="refreshBtn" title="今すぐ更新">🔄</button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- ステータスバー -->
        <section class="status-bar" id="statusBar">
            <div class="status-bar-inner">
                <div class="status-item">
                    <span class="status-label">最終スキャン</span>
                    <span class="status-value" id="lastScan">—</span>
                </div>
                <div class="status-item">
                    <span class="status-label">処理時間</span>
                    <span class="status-value" id="elapsed">—</span>
                </div>
                <div class="status-item">
                    <span class="status-label">商品数</span>
                    <span class="status-value" id="totalProducts">—</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Yahoo</span>
                    <span class="status-value" id="totalYahoo">—</span>
                </div>
                <div class="status-item">
                    <span class="status-label">楽天</span>
                    <span class="status-value" id="totalRakuten">—</span>
                </div>
            </div>
        </section>

        <!-- サマリーカード -->
        <section class="summary-section">
            <div class="summary-grid">
                <div class="summary-card card-alerts">
                    <div class="card-glow"></div>
                    <div class="card-icon">🔥</div>
                    <div class="card-value" id="alertCount">0</div>
                    <div class="card-label">アラート</div>
                </div>
                <div class="summary-card card-candidates">
                    <div class="card-glow"></div>
                    <div class="card-icon">🎯</div>
                    <div class="card-value" id="candidateCount">0</div>
                    <div class="card-label">候補商品</div>
                </div>
                <div class="summary-card card-profit">
                    <div class="card-glow"></div>
                    <div class="card-icon">💰</div>
                    <div class="card-value" id="maxProfit">—</div>
                    <div class="card-label">最大利益</div>
                </div>
                <div class="summary-card card-roi">
                    <div class="card-glow"></div>
                    <div class="card-icon">📊</div>
                    <div class="card-value" id="maxRoi">—</div>
                    <div class="card-label">最大ROI</div>
                </div>
            </div>
        </section>

        <!-- アラート一覧 -->
        <section class="alerts-section" id="alertsSection">
            <div class="section-header">
                <h2><span class="section-icon">🔥</span> 利益アラート</h2>
                <div class="section-badge" id="alertBadge">0件</div>
            </div>
            <div class="alerts-list" id="alertsList">
                <div class="empty-state">
                    <div class="empty-icon">📡</div>
                    <div class="empty-text">モニター起動待ち…</div>
                    <div class="empty-sub">サーバーでスキャンが完了すると結果が表示されます</div>
                </div>
            </div>
        </section>

        <!-- 全商品一覧 -->
        <section class="products-section" id="productsSection">
            <div class="section-header">
                <h2><span class="section-icon">👟</span> スキャン済み商品</h2>
                <div class="section-badge" id="productBadge">0件</div>
            </div>
            <div class="products-grid" id="productsGrid">
                <div class="empty-state">
                    <div class="empty-icon">👟</div>
                    <div class="empty-text">商品データなし</div>
                </div>
            </div>
        </section>
    </main>

    <!-- フッター -->
    <footer class="footer">
        <p>SnkrdunkArb v5.0 — 新品のみフィルタ対応 | 楽天 × Yahoo × メルカリ</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
